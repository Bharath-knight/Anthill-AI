<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anthill icon</title>
<!-- DEV ASSET: rendered at 512x512 then downscaled to 128. ?type=a | ?type=ant -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  .icon { width: 100vw; height: 100vh; border-radius: 22%; display: grid; place-items: center; }
  .icon.a { background: linear-gradient(155deg, #c8f23a, #a9da1f); }
  .icon.a .glyph { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-weight: 800; font-size: 66vw; color: #0e0e11; line-height: 1; letter-spacing: -0.04em; }
  .icon.ant { background: radial-gradient(120% 120% at 30% 20%, #20222b, #131419); }
  .icon.ant svg { width: 72%; height: 72%; display: block; }
</style>
</head>
<body>
  <div class="icon" id="icon"></div>
<script>
  const type = new URLSearchParams(location.search).get('type') || 'a';
  const icon = document.getElementById('icon');
  if (type === 'ant') {
    icon.className = 'icon ant';
    icon.innerHTML = `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#b8e62e" stroke-width="2.6" stroke-linecap="round">
        <path d="M30 34 L20 44"/><path d="M31 36 L24 49"/><path d="M34 35 L44 45"/><path d="M33 37 L40 50"/><path d="M22 30 L12 36"/><path d="M22 33 L14 42"/>
      </g>
      <ellipse cx="42" cy="34" rx="12" ry="10.5" fill="#b8e62e"/><circle cx="29" cy="32" r="7" fill="#b8e62e"/><circle cx="18" cy="28" r="8.5" fill="#b8e62e"/>
      <g stroke="#b8e62e" stroke-width="2.4" stroke-linecap="round" fill="none"><path d="M14 22 C10 15 12 11 9 9"/><path d="M21 21 C19 13 22 10 21 7"/></g>
      <circle cx="9" cy="8" r="2.4" fill="#eafdc0"/><circle cx="21" cy="6.5" r="2.4" fill="#eafdc0"/>
      <circle cx="16" cy="27" r="2.1" fill="#16161b"/><circle cx="21" cy="28" r="2.1" fill="#16161b"/>
      <path d="M51 24 C58 22 60 28 56 33 C52 31 50 28 51 24 Z" fill="#eafdc0"/><path d="M53 25 C54 28 55 30 56 32" stroke="#16161b" stroke-width="1.3" stroke-linecap="round"/>
    </svg>`;
  } else {
    icon.className = 'icon a';
    icon.innerHTML = `<span class="glyph">A</span>`;
  }
</script>
</body>
</html>
