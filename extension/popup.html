<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anthill</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div style="padding:16px">
    <div style="font-weight:700;font-size:15px;margin-bottom:16px">Anthill</div>

    <div id="url-display" class="text-muted" style="margin-bottom:12px;font-size:11px;word-break:break-all"></div>

    <button class="btn btn-primary" id="capture-btn">Capture This Job</button>

    <div id="status-msg" style="margin-top:12px;font-size:12px;display:none"></div>

    <div style="margin-top:16px;padding-top:12px;border-top:1px solid #e5e7eb">
      <div style="font-size:11px;color:#6b7280;margin-bottom:4px">API URL</div>
      <div style="display:flex;gap:6px">
        <input id="api-url-input" type="text" placeholder="https://your-app.vercel.app"
          style="flex:1;font-size:11px;border:1px solid #d1d5db;border-radius:4px;padding:4px 8px;outline:none" />
        <button id="save-url-btn"
          style="font-size:11px;padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;background:#f9fafb;cursor:pointer">
          Save
        </button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
