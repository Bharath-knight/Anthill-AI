<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anthill</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-mark">A</span>
      <span class="logo-text">Anthill</span>
    </div>
    <div id="user-info" class="header-right" style="display:none">
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn-link">Sign out</button>
    </div>
  </div>

  <!-- Login section -->
  <section id="login-section" class="section">
    <div class="muted small mb-12">Sign in to capture content into your Anthill account.</div>
    <div class="form-group">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input id="login-password" type="password" autocomplete="current-password" />
    </div>
    <button id="login-btn" class="btn btn-primary">Sign in</button>
    <button id="google-login-btn" class="btn btn-secondary mt-8">Continue with Google</button>
    <div id="login-status" class="alert" style="display:none"></div>
    <div class="muted small mt-12 center">
      No account?
      <a id="open-signup" href="#" class="link">Sign up at anthill-ai.vercel.app</a>
      <span class="sep">·</span>
      <a id="open-reset" href="#" class="link">Reset password</a>
    </div>
  </section>

  <!-- Capture section -->
  <section id="capture-section" class="section">
    <div class="url-row">
      <div class="muted small mb-4">Current page</div>
      <div id="url-display" class="preview-box"></div>
    </div>

    <button id="capture-btn" class="btn btn-primary">Capture this page</button>
    <div id="capture-status" class="alert" style="display:none"></div>
  </section>

  <!-- Footer: link to the web app -->
  <div class="settings-panel center">
    <a id="open-web" href="#" class="link small">Open Anthill ↗</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
